name: Deploy GitHub Pages

on:
    push:
        branches: [dev]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: emscripten-core/setup-emsdk@v15

            - run: npm ci --prefix modules/blockRenderer

            - run: mkdir -p apps/web/public/generated && make -C modules/blockGenerator wasm EMCC=emcc

            - run: |
                  rm -rf _site
                  mkdir -p _site
                  cp -R apps/web/public/. _site/
                  cp -R apps/web/src _site/src
                  mkdir -p _site/modules/blockRenderer/src
                  cp -R modules/blockRenderer/src/core _site/modules/blockRenderer/src/core
                  mkdir -p _site/vendor
                  cp -R modules/blockRenderer/node_modules/three _site/vendor/three
                  touch _site/.nojekyll

            - uses: actions/upload-pages-artifact@v4
              with:
                  path: _site

    deploy:
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
